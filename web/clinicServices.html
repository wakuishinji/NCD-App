<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>診療入力 - NCD</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">
  <!-- ローディングオーバーレイ -->
  <div id="loadingOverlay" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/30 backdrop-blur-sm">
    <div class="bg-white/95 text-gray-800 rounded shadow px-5 py-4 flex items-center gap-3">
      <div class="h-5 w-5 border-2 border-gray-300 border-t-blue-600 rounded-full animate-spin"></div>
      <div class="text-sm font-medium">情報を取得しています…</div>
    </div>
  </div>

  <!-- Header -->
  <header class="bg-gradient-to-r from-blue-950 via-slate-900 to-blue-950 text-white shadow">
    <div class="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <a href="/index.html" class="inline-flex items-center rounded bg-white/20 px-3 py-1 text-sm font-semibold text-white transition hover:bg-white/30">Top</a>
        <a href="clinicHome.html" class="inline-flex items-center rounded bg-white/20 px-3 py-1 text-sm font-semibold text-white transition hover:bg-white/30">施設ホームへ</a>
      </div>
      <h1 class="text-lg font-bold">診療入力</h1>
      <div class="w-[120px]"></div>
    </div>
  </header>

  <!-- Main -->
  <main class="flex-1 max-w-4xl mx-auto p-4 md:p-6">
    <div class="bg-white rounded shadow p-4 md:p-6 space-y-6">
      <div class="text-sm text-gray-600">対象施設: <span id="clinicTitle" class="font-semibold text-gray-800">（未選択）</span></div>
      <section class="space-y-8">
        <div class="space-y-3" id="formSection">
          <h2 class="text-blue-800 font-semibold">診療の登録</h2>

          <div>
            <label class="block text-sm text-gray-700 mb-1">分類</label>
            <select id="svcCategory" class="w-full border rounded px-3 py-2"></select>
          </div>

          <div>
            <label class="block text-sm text-gray-700 mb-1">診療名</label>
            <select id="svcMaster" class="w-full border rounded px-3 py-2" disabled>
              <option value="">（分類を選択してください）</option>
            </select>
          </div>

          <div id="manualFields" class="space-y-2 hidden">
            <div>
              <label class="block text-sm text-gray-700 mb-1">診療名（手入力）</label>
              <input id="svcManualName" class="w-full border rounded px-3 py-2" placeholder="例: 不整脈外来" />
            </div>
          </div>

          <div>
            <label class="block text-sm text-gray-700 mb-1">説明</label>
            <textarea id="svcDesc" rows="4" class="w-full border rounded px-3 py-2" placeholder="対象疾患や提供内容、特徴などを入力してください"></textarea>
            <div class="mt-2 flex items-center gap-2">
              <button id="btnGenSvcDesc" class="bg-indigo-600 text-white px-3 py-2 rounded hover:bg-indigo-700">
                AIで説明生成
              </button>
              <span id="svcHint" class="text-xs text-gray-500"></span>
            </div>
          </div>

          <div class="flex items-center justify-end gap-2 pt-2">
            <button id="btnClear" class="bg-gray-200 px-4 py-2 rounded hover:bg-gray-300">クリア</button>
            <button id="btnRegister" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">登録</button>
          </div>
        </div>

        <div class="space-y-3">
          <div class="flex items-center justify-between">
            <h2 class="text-blue-800 font-semibold">登録済み診療</h2>
            <button id="btnReload" class="text-sm bg-gray-100 hover:bg-gray-200 px-3 py-1 rounded">再読込</button>
          </div>
          <div id="svcList" class="space-y-2"></div>
        </div>
      </section>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-gray-200 text-gray-700 text-center py-4">
    <p class="text-xs">© 2025 中野区医師会 - Nakano Clinic Database</p>
  </footer>

<script>
const BASE = "https://ncd-app.altry.workers.dev";

let selectedClinic = null;
let svcMaster = [];
let workingList = [];
let editIndex = null;

const categorySelect = document.getElementById("svcCategory");
const masterSelect = document.getElementById("svcMaster");
const manualFields = document.getElementById("manualFields");
const manualNameInput = document.getElementById("svcManualName");
const descInput = document.getElementById("svcDesc");
const hintLabel = document.getElementById("svcHint");
const registerButton = document.getElementById("btnRegister");
const clearButton = document.getElementById("btnClear");

function formatAiError(message, fallback = 'AIエラーが発生しました') {
  const base = (typeof message === 'string' && message.trim()) ? message.trim() : fallback;
  if (/incorrect api key/i.test(base) || /invalid_api_key/i.test(base)) {
    return 'AIエラー: APIキーが無効です。管理画面の設定で有効なキーを再設定してください。';
  }
  return base.replace(/sk-[a-z0-9]{8,}/gi, 'sk-********');
}

function setLoading(on) {
  const el = document.getElementById('loadingOverlay');
  if (!el) return;
  el.classList.toggle('hidden', !on);
  el.classList.toggle('flex', on);
}

function loadSelectedClinic(){
  const stored = localStorage.getItem("selectedClinic");
  const titleEl = document.getElementById("clinicTitle");
  if (stored) {
    selectedClinic = JSON.parse(stored);
    if (titleEl) titleEl.textContent = selectedClinic.name || "";
  } else {
    if (titleEl) titleEl.textContent = "（未選択）";
    alert("施設選択または新規登録後にお進みください。");
  }
}

async function loadCategories(){
  const res = await fetch(`${BASE}/api/listCategories?type=service`);
  const data = await res.json();
  const cats = (data.ok ? data.categories : []) || [];
  if (!cats.length) {
    categorySelect.innerHTML = `<option value="">（分類なし）</option>`;
  } else {
    categorySelect.innerHTML = [`<option value="">（分類を選択）</option>`, ...cats.map(c=>`<option>${c}</option>`)].join("");
  }
}

async function loadSvcMaster(){
  try {
  const url = new URL(`${BASE}/api/listMasterByCategory`);
  url.searchParams.set("type","service");
  url.searchParams.set("status","approved");
  url.searchParams.set("category", category);
    const res = await fetch(url.toString());
    const data = await res.json();
    svcMaster = (data.ok ? data.items : []) || [];
  } catch (err) {
    console.warn('failed to load service master', err);
    svcMaster = [];
  }
}

function normalizeKey(entry){
  return `${(entry.category||"").trim().toLowerCase()}|${(entry.name||"").trim().toLowerCase()}`;
}

function findMasterMatch(entry){
  return svcMaster.find(it => normalizeKey(it) === normalizeKey(entry));
}

function setManualMode(show, entry = {}){
  manualFields.classList.toggle('hidden', !show);
  if (show) {
    manualNameInput.value = entry.name || "";
  } else {
    manualNameInput.value = "";
  }
}

function loadMasterOptions(selectedEntry = null){
  const category = categorySelect.value;
  masterSelect.innerHTML = "";
  if (!category) {
    masterSelect.disabled = true;
    masterSelect.innerHTML = `<option value="">（分類を選択してください）</option>`;
    setManualMode(false);
    return;
  }

  masterSelect.disabled = false;
  const options = [`<option value="">（選択してください）</option>`];
  svcMaster
    .filter(it => it.category === category)
    .forEach(it => {
      const label = `${it.name}${it.desc ? `（${it.desc}）` : (it.canonical_name ? `（別名:${it.canonical_name}）` : "")}`;
      options.push(`<option value='${JSON.stringify({ category: it.category, name: it.name, desc: it.desc || "" })}'>${label}</option>`);
    });
  options.push('<option value="__manual__">（手書き入力）</option>');
  masterSelect.innerHTML = options.join('');

  let selectedValue = "";
  if (selectedEntry) {
    const match = findMasterMatch(selectedEntry);
    if (match) {
      selectedValue = JSON.stringify({ category: match.category, name: match.name, desc: match.desc || "" });
      setManualMode(false);
    } else {
      selectedValue = "__manual__";
      setManualMode(true, selectedEntry);
    }
  } else {
    setManualMode(false);
  }

  masterSelect.value = selectedValue;
  if (masterSelect.value === "__manual__") {
    setManualMode(true, selectedEntry || {});
  }
}

function updateRegisterButtonLabel(){
  registerButton.textContent = editIndex === null ? "登録" : "修正を反映";
}

function resetForm(){
  if (categorySelect.options.length) {
    categorySelect.selectedIndex = 0;
  }
  hintLabel.textContent = "";
  descInput.value = "";
  masterSelect.innerHTML = `<option value="">（分類を選択してください）</option>`;
  masterSelect.disabled = true;
  setManualMode(false);
  editIndex = null;
  updateRegisterButtonLabel();
}

function onCategoryChange(){
  loadMasterOptions();
  masterSelect.value = "";
  descInput.value = "";
  hintLabel.textContent = "";
  editIndex = null;
  updateRegisterButtonLabel();
}

function onMasterChange(){
  const value = masterSelect.value;
  if (!value) {
    setManualMode(false);
    return;
  }
  if (value === "__manual__") {
    setManualMode(true);
    return;
  }
  try {
    const obj = JSON.parse(value);
    setManualMode(false);
    if (!descInput.value) {
      descInput.value = obj.desc || "";
    }
  } catch (_) {
    setManualMode(false);
  }
}

async function genDesc(){
  const category = categorySelect.value;
  const masterValue = masterSelect.value;
  let name = "";
  if (!category) { alert('分類を選択してください'); return; }
  if (!masterValue) { alert('診療名を選択してください'); return; }
  if (masterValue === "__manual__") {
    name = manualNameInput.value.trim();
    if (!name) { alert('診療名（手入力）を入力してください'); return; }
  } else {
    try {
      name = JSON.parse(masterValue).name || "";
    } catch (_) {
      name = "";
    }
  }
  if (!name) { alert('診療名を選択してください'); return; }

  hintLabel.textContent = 'AI生成を試行中…';

  let sys = "医療説明用のサンプルを作ってください";
  try {
    const rs = await fetch(`${BASE}/api/settings`);
    const ds = await rs.json();
    if (ds && ds.prompt_diagnosis) sys = ds.prompt_diagnosis;
  } catch(_){}

  try{
    const r = await fetch(`${BASE}/api/generate`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        messages: [
          { role:"system", content: sys },
          { role:"user", content: `次の診療について、患者さん向けにやさしく100～150字で要点説明を書いてください。対象疾患や進め方、必要な検査があれば触れてください。\n分類: ${category}\n診療名: ${name}` }
        ]
      })
    });
    const d = await r.json();
    if (!r.ok) {
      hintLabel.textContent = formatAiError(d?.error?.message, `AIエラー (${r.status})`);
      console.error('AI生成エラー', d);
      return;
    }
    if (d?.error?.message) {
      hintLabel.textContent = formatAiError(d.error.message);
      console.error('AI生成エラー', d.error);
      return;
    }

    const text = d?.choices?.[0]?.message?.content || d?.text || "";
    if (text) {
      descInput.value = text.trim();
      hintLabel.textContent='AIで説明生成しました';
    } else {
      hintLabel.textContent='AI応答なし';
    }
  }catch(e){
    hintLabel.textContent='AI接続不可';
    console.error('AI接続エラー', e);
  }
}

async function fetchCurrentClinic(){
  const name = selectedClinic?.name || "";
  if (!name) return null;
  const res = await fetch(`${BASE}/api/listClinics`);
  const data = await res.json();
  const arr = (data.ok && data.clinics) ? data.clinics : [];
  return arr.find(c => c.name === name) || null;
}

function getEntryFromForm(){
  const category = categorySelect.value.trim();
  if (!category) { alert('分類を選択してください'); return null; }

  const masterValue = masterSelect.value;
  if (!masterValue) { alert('診療名を選択してください'); return null; }

  let name = "";
  let desc = descInput.value.trim();

  if (masterValue === "__manual__") {
    name = manualNameInput.value.trim();
    if (!name) { alert('診療名（手入力）を入力してください'); return null; }
  } else {
    try {
      const obj = JSON.parse(masterValue);
      name = obj.name || "";
      if (!desc && obj.desc) {
        desc = obj.desc;
      }
    } catch (err) {
      console.warn('failed to parse master value', err);
      alert('診療名の選択内容を取得できませんでした');
      return null;
    }
  }

  return { category, name, desc };
}

function renderSvcList(){
  const container = document.getElementById('svcList');
  container.innerHTML = "";
  if (!workingList.length) {
    container.innerHTML = `<div class='px-3 py-2 text-sm text-gray-500 border rounded bg-gray-50'>登録された診療はありません。</div>`;
    return;
  }

  workingList.forEach((entry, index) => {
    const row = document.createElement('div');
    row.className = 'border rounded px-3 py-2 bg-white shadow-sm flex items-start justify-between gap-3';

    const info = document.createElement('div');
    info.innerHTML = `
      <div class='font-semibold text-blue-800'>${entry.category} / ${entry.name}</div>
      <div class='text-sm text-gray-600 whitespace-pre-wrap'>${entry.desc || ''}</div>
    `;

    const actions = document.createElement('div');
    actions.className = 'flex items-center gap-2';

    const editBtn = document.createElement('button');
    editBtn.className = 'text-sm px-3 py-1 rounded bg-indigo-50 text-indigo-700 hover:bg-indigo-100';
    editBtn.textContent = '修正';
    editBtn.addEventListener('click', () => editEntry(index));

    const delBtn = document.createElement('button');
    delBtn.className = 'text-sm px-3 py-1 rounded bg-rose-50 text-rose-700 hover:bg-rose-100';
    delBtn.textContent = '削除';
    delBtn.addEventListener('click', () => deleteEntry(index));

    actions.appendChild(editBtn);
    actions.appendChild(delBtn);

    row.appendChild(info);
    row.appendChild(actions);
    container.appendChild(row);
  });
}

async function registerSvcCandidates(entries){
  if (!entries?.length) return;
  const unique = Array.from(new Map(entries.map(e => [normalizeKey(e), e])).values());
  const targets = unique.filter(e => !findMasterMatch(e));
  if (!targets.length) return;
  await Promise.allSettled(targets.map(e =>
    fetch(`${BASE}/api/addMasterItem`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        type: "service",
        category: e.category,
        name: e.name,
        desc: e.desc || "",
        source: "clinicServices"
      })
    })
  ));
}

async function reloadWorkingList(){
  setLoading(true);
  try {
    const clinic = await fetchCurrentClinic();
    workingList = Array.isArray(clinic?.services) ? [...clinic.services] : [];
    renderSvcList();
  } finally {
    setLoading(false);
  }
}

async function persistWorkingList(latestEntry, isEdit){
  if (!selectedClinic?.name) { alert('施設が選択されていません'); return; }
  const clinic = await fetchCurrentClinic();
  const payload = {
    name: selectedClinic.name,
    ...(clinic || { id: selectedClinic.name }),
    services: workingList
  };

  const res = await fetch(`${BASE}/api/updateClinic`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });
  if (!res.ok) {
    alert('保存に失敗しました');
    await reloadWorkingList();
    return;
  }

  if (latestEntry) {
    await registerSvcCandidates([latestEntry]);
    alert(isEdit ? '更新しました' : '登録しました');
  }
}

function editEntry(index){
  const entry = workingList[index];
  editIndex = index;
  categorySelect.value = entry.category;
  loadMasterOptions(entry);
  descInput.value = entry.desc || "";
  updateRegisterButtonLabel();
}

async function registerEntry(){
  const isEdit = editIndex !== null;
  const entry = getEntryFromForm();
  if (!entry) return;
  setLoading(true);
  try {
    if (isEdit) {
      workingList[editIndex] = entry;
    } else {
      workingList.push(entry);
    }
    renderSvcList();
    await persistWorkingList(entry, isEdit);
    resetForm();
  } finally {
    setLoading(false);
  }
}

async function deleteEntry(index){
  if (!confirm('この診療を削除しますか？')) return;
  setLoading(true);
  try {
    workingList.splice(index, 1);
    if (editIndex !== null) {
      if (editIndex === index) {
        resetForm();
      } else if (editIndex > index) {
        editIndex -= 1;
        updateRegisterButtonLabel();
      }
    }
    renderSvcList();
    await persistWorkingList(null, true);
    alert('削除しました');
  } finally {
    setLoading(false);
  }
}

categorySelect.addEventListener('change', onCategoryChange);
masterSelect.addEventListener('change', onMasterChange);
document.getElementById('btnGenSvcDesc').addEventListener('click', genDesc);
document.getElementById('btnReload').addEventListener('click', reloadWorkingList);
registerButton.addEventListener('click', registerEntry);
clearButton.addEventListener('click', resetForm);

(async function init(){
  setLoading(true);
  try {
    loadSelectedClinic();
    await loadCategories();
    await loadSvcMaster();
    resetForm();
    await reloadWorkingList();
  } finally {
    setLoading(false);
    setTimeout(() => setLoading(false), 10000);
  }
})();
</script>
<script>
// モデル選択ドロップダウンを動的に追加し、/api/settings の model を更新
(async function addModelPickerSvc(){
  try {
    const btn = document.getElementById('btnGenSvcDesc');
    if (!btn) return;
    const sel = document.createElement('select');
    sel.id = 'modelSelectSvc';
    sel.className = 'border rounded px-2 py-2 text-sm';
    ['gpt-4o-mini','gpt-4o','gpt-4.1-mini','o4-mini'].forEach(m=>{
      const o=document.createElement('option'); o.value=m; o.textContent=m; sel.appendChild(o);
    });
    btn.parentNode.insertBefore(sel, btn);
    try { const rs = await fetch(`${BASE}/api/settings`); const ds = await rs.json(); if (ds?.model) sel.value = ds.model; } catch(_){ }
    sel.addEventListener('change', async ()=>{
      try { await fetch(`${BASE}/api/settings`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ model: sel.value })}); } catch(_){ }
    });
  } catch(_){}
})();
</script>
</body>
</html>
