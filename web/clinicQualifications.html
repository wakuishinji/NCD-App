<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>資格入力 - NCD</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">
  <!-- Header -->
  <header class="bg-gradient-to-r from-blue-950 via-slate-900 to-blue-950 text-white shadow">
    <div class="max-w-screen-2xl mx-auto px-4 py-4 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <a href="/index.html" class="inline-flex items-center rounded bg-white/20 px-3 py-1 text-sm font-semibold text-white transition hover:bg-white/30">Top</a>
        <a href="clinicHome.html" class="inline-flex items-center rounded bg-white/20 px-3 py-1 text-sm font-semibold text-white transition hover:bg-white/30">施設ホームへ</a>
      </div>
      <h1 class="text-lg font-bold">資格入力</h1>
      <div class="w-[120px]"></div>
    </div>
  </header>

  <!-- Main -->
  <main class="flex-1 max-w-screen-2xl mx-auto p-4 md:p-6">
    <div class="bg-white rounded shadow p-4 md:p-6 space-y-6">
      <div class="text-sm text-gray-600">対象施設: <span id="clinicTitle" class="font-semibold text-gray-800">（未選択）</span></div>
      <section class="space-y-8">
        <div class="space-y-3 w-full" id="formSection">
          <h2 class="text-blue-800 font-semibold">専門資格の登録</h2>

          <div>
            <label class="block text-sm text-gray-700 mb-1">分類</label>
            <select id="qualCategory" class="w-full border rounded px-3 py-2"></select>
          </div>

          <div>
            <label class="block text-sm text-gray-700 mb-1">専門資格</label>
            <select id="qualMaster" class="w-full border rounded px-3 py-2" disabled>
              <option value="">（分類を選択してください）</option>
            </select>
          </div>

          <div id="manualFields" class="space-y-2 hidden">
            <div>
              <label class="block text-sm text-gray-700 mb-1">専門資格名（手入力）</label>
              <input id="qualName" class="w-full border rounded px-3 py-2" placeholder="例: 総合内科専門医" />
            </div>
            <div>
              <label class="block text-sm text-gray-700 mb-1">認定団体（任意）</label>
              <input id="qualIssuer" class="w-full border rounded px-3 py-2" placeholder="例: 日本内科学会" />
            </div>
          </div>

          <div class="flex flex-wrap items-center justify-end gap-2">
            <button id="btnClear" class="bg-gray-200 px-4 py-2 rounded hover:bg-gray-300">クリア</button>
            <button id="btnAddSel" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">登録</button>
          </div>
        </div>

        <div class="space-y-3 w-full">
          <h2 class="text-blue-800 font-semibold">登録済み専門資格</h2>
          <div id="qualificationList" class="space-y-2"></div>
        </div>
      </section>
    </div>
  </main>

  <footer class="bg-gray-200 text-gray-700 text-center py-4">
    <p class="text-xs">© 2025 中野区医師会 - Nakano Clinic Database</p>
  </footer>

<script>

const BASE = "https://ncd-app.altry.workers.dev";
let selectedClinic = null;
let qualificationMaster = [];
let workingList = [];
let editIndex = null;

const categorySelect = document.getElementById("qualCategory");
const masterSelect = document.getElementById("qualMaster");
const manualFields = document.getElementById("manualFields");
const nameInput = document.getElementById("qualName");
const issuerInput = document.getElementById("qualIssuer");
const registerButton = document.getElementById("btnAddSel");
const clearButton = document.getElementById("btnClear");

function loadSelectedClinic(){
  const stored = localStorage.getItem("selectedClinic");
  const titleEl = document.getElementById("clinicTitle");
  if (stored) {
    selectedClinic = JSON.parse(stored);
    if (titleEl) titleEl.textContent = selectedClinic.name || "";
  } else {
    if (titleEl) titleEl.textContent = "（未選択）";
    alert("施設選択または新規登録後にお進みください。");
  }
}

async function loadCategories(){
  const res = await fetch(`${BASE}/api/listCategories?type=qual`);
  const data = await res.json();
  const cats = (data.ok ? data.categories : []) || [];
  if (!cats.length) {
    categorySelect.innerHTML = `<option value="">（分類なし）</option>`;
  } else {
    categorySelect.innerHTML = [`<option value="">（分類を選択）</option>`, ...cats.map(c=>`<option>${c}</option>`) ].join("");
  }
}

async function loadQualificationMaster(){
  try {
    const url = new URL(`${BASE}/api/listMaster`);
    url.searchParams.set("type","qual");
    url.searchParams.set("status","approved");
    const res = await fetch(url.toString());
    const data = await res.json();
    qualificationMaster = (data.ok ? data.items : []) || [];
  } catch (err) {
    console.warn('failed to load qualification master', err);
    qualificationMaster = [];
  }
}

function normalizeKey(q){
  return `${(q.category||"").trim().toLowerCase()}|${(q.name||"").trim().toLowerCase()}`;
}

function findMasterMatch(entry){
  return qualificationMaster.find(it => normalizeKey(it) === normalizeKey(entry));
}

function setManualMode(show, entry = {}){
  manualFields.classList.toggle('hidden', !show);
  if (show) {
    nameInput.value = entry.name || "";
    issuerInput.value = entry.issuer || "";
  } else {
    nameInput.value = "";
    issuerInput.value = "";
  }
}

function loadApprovedMasterForCategory(selectedEntry = null){
  const category = categorySelect.value;
  masterSelect.innerHTML = "";
  if (!category) {
    masterSelect.disabled = true;
    masterSelect.innerHTML = `<option value="">（分類を選択してください）</option>`;
    setManualMode(false);
    return;
  }

  masterSelect.disabled = false;
  const options = [`<option value="">（選択してください）</option>`];
  qualificationMaster
    .filter(it => it.category === category)
    .forEach(it => {
      const label = `${it.name}${it.issuer?`（${it.issuer}）`:""}`;
      options.push(`<option value='${JSON.stringify({ category: it.category, name: it.name, issuer: it.issuer || "" })}'>${label}</option>`);
    });
  options.push('<option value="__manual__">手書き入力</option>');
  masterSelect.innerHTML = options.join('');

  let selectedValue = "";
  if (selectedEntry) {
    const match = findMasterMatch(selectedEntry);
    if (match) {
      selectedValue = JSON.stringify({ category: match.category, name: match.name, issuer: match.issuer || "" });
      setManualMode(false);
    } else {
      selectedValue = "__manual__";
      setManualMode(true, selectedEntry);
    }
  } else {
    setManualMode(false);
  }

  masterSelect.value = selectedValue;
  if (masterSelect.value === "__manual__") {
    setManualMode(true, selectedEntry || {});
  }
}

function updateRegisterButtonLabel(){
  registerButton.textContent = editIndex === null ? "登録" : "修正を反映";
}

function resetForm(){
  if (categorySelect.options.length) {
    categorySelect.selectedIndex = 0;
  }
  editIndex = null;
  loadApprovedMasterForCategory();
  updateRegisterButtonLabel();
}

function onCategoryChange(){
  loadApprovedMasterForCategory();
  editIndex = null;
  updateRegisterButtonLabel();
}

function onMasterChange(){
  const value = masterSelect.value;
  if (value === "__manual__") {
    setManualMode(true);
  } else {
    setManualMode(false);
  }
}

function getEntryFromForm(){
  const category = categorySelect.value.trim();
  const masterValue = masterSelect.value;
  if (!category) {
    alert("分類を選択してください");
    return null;
  }
  if (!masterValue) {
    alert("専門資格を選択してください");
    return null;
  }

  if (masterValue === "__manual__") {
    const name = nameInput.value.trim();
    const issuer = issuerInput.value.trim();
    if (!name) {
      alert("専門資格名を入力してください");
      return null;
    }
    return { category, name, issuer };
  }

  try {
    const parsed = JSON.parse(masterValue);
    return { category: parsed.category || category, name: parsed.name || "", issuer: parsed.issuer || "" };
  } catch (_) {
    alert("専門資格の選択内容を解釈できません");
    return null;
  }
}

function renderQualificationList(){
  const container = document.getElementById("qualificationList");
  container.innerHTML = "";
  if (!workingList.length) {
    container.innerHTML = `<div class="text-sm text-gray-500">登録された専門資格はありません。</div>`;
    return;
  }

  workingList.forEach((entry, idx) => {
    const row = document.createElement('div');
    row.className = 'flex items-center justify-between gap-3 border rounded px-3 py-2 bg-gray-50';

    const info = document.createElement('div');
    info.className = 'text-sm text-gray-800';
    const nameEl = document.createElement('div');
    nameEl.className = 'font-semibold';
    nameEl.textContent = entry.name;
    const catEl = document.createElement('div');
    catEl.className = 'text-xs text-gray-500';
    catEl.textContent = entry.category;
    info.appendChild(nameEl);
    info.appendChild(catEl);
    if (entry.issuer) {
      const issuerEl = document.createElement('div');
      issuerEl.className = 'text-xs text-gray-500';
      issuerEl.textContent = entry.issuer;
      info.appendChild(issuerEl);
    }

    const actions = document.createElement('div');
    actions.className = 'flex items-center gap-2';
    const editBtn = document.createElement('button');
    editBtn.className = 'text-sm text-blue-600 hover:text-blue-800';
    editBtn.textContent = '修正';
    editBtn.addEventListener('click', () => editEntry(idx));
    const delBtn = document.createElement('button');
    delBtn.className = 'text-sm text-red-600 hover:text-red-800';
    delBtn.textContent = '削除';
    delBtn.addEventListener('click', () => deleteEntry(idx));
    actions.appendChild(editBtn);
    actions.appendChild(delBtn);

    row.appendChild(info);
    row.appendChild(actions);
    container.appendChild(row);
  });
}

function editEntry(index){
  const entry = workingList[index];
  editIndex = index;
  categorySelect.value = entry.category;
  loadApprovedMasterForCategory(entry);
  updateRegisterButtonLabel();
}

async function registerEntry(){
  const entry = getEntryFromForm();
  if (!entry) return;

  if (editIndex !== null) {
    workingList[editIndex] = entry;
  } else {
    workingList.push(entry);
  }
  renderQualificationList();
  await persistWorkingList(entry);
  resetForm();
}

async function registerQualificationCandidates(entries){
  if (!entries?.length) return;
  const unique = Array.from(new Map(entries.map(e => [normalizeKey(e), e])).values());
  const targets = unique.filter(e => !findMasterMatch(e));
  if (!targets.length) return;
  await Promise.allSettled(targets.map(e =>
    fetch(`${BASE}/api/addMasterItem`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        type: "qual",
        category: e.category,
        name: e.name,
        issuer: e.issuer || "",
        source: "clinicQualifications"
      })
    })
  ));
}

async function fetchCurrentClinic(){
  const name = selectedClinic?.name || "";
  if (!name) return null;
  const res = await fetch(`${BASE}/api/listClinics`);
  const data = await res.json();
  const arr = (data.ok && data.clinics) ? data.clinics : [];
  return arr.find(c => c.name === name) || null;
}

async function reloadWorkingList(){
  const clinic = await fetchCurrentClinic();
  workingList = Array.isArray(clinic?.qualifications) ? [...clinic.qualifications] : [];
  renderQualificationList();
  resetForm();
}

async function persistWorkingList(latestEntry){
  if (!selectedClinic?.name) { alert("施設が選択されていません"); return; }
  const clinic = await fetchCurrentClinic();
  const payload = {
    name: selectedClinic.name,
    ...(clinic || { id: selectedClinic.name }),
    qualifications: workingList
  };

  const res = await fetch(`${BASE}/api/updateClinic`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });
  if (!res.ok) {
    alert("保存に失敗しました");
    await reloadWorkingList();
    return;
  }

  if (latestEntry) {
    await registerQualificationCandidates([latestEntry]);
    alert(editIndex === null ? "登録しました" : "更新しました");
  }
}

async function deleteEntry(index){
  if (!confirm('この資格を削除しますか？')) return;
  const removed = workingList.splice(index, 1);
  if (editIndex !== null) {
    if (editIndex === index) {
      resetForm();
    } else if (editIndex > index) {
      editIndex -= 1;
      updateRegisterButtonLabel();
    }
  }
  renderQualificationList();
  await persistWorkingList();
  alert("削除しました");
}

registerButton.addEventListener("click", registerEntry);
clearButton.addEventListener("click", resetForm);
categorySelect.addEventListener("change", onCategoryChange);
masterSelect.addEventListener("change", onMasterChange);

(async function init(){
  loadSelectedClinic();
  await loadCategories();
  await loadQualificationMaster();
  resetForm();
  await reloadWorkingList();
})();

</script>
</body>
</html>
